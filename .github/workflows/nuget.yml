name: NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish the generated package to NuGet.org'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-linux-native:
    name: Build Linux native assets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build NativeBridge (Linux)
        run: ./NativeBridge/build.sh

      - name: Verify Linux trader bridge exports
        run: nm -D NativeBridge/build/libctptrader_bridge.so | grep ' ctp_trader_create$'

      - name: Stage Linux native assets
        run: |
          mkdir -p artifacts/linux-x64
          cp NativeBridge/build/libctpmd_bridge.so artifacts/linux-x64/
          cp NativeBridge/build/libctptrader_bridge.so artifacts/linux-x64/
          cp NativeBridge/build/thostmduserapi_se.so artifacts/linux-x64/
          cp NativeBridge/build/thosttraderapi_se.so artifacts/linux-x64/

      - name: Upload Linux native assets
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: artifacts/linux-x64/
          if-no-files-found: error

  build-windows-native:
    name: Build Windows native assets
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build NativeBridge (Windows)
        shell: pwsh
        run: ./NativeBridge/build.ps1

      - name: Stage Windows native assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/win-x64 | Out-Null
          $files = @(
            'ctpmd_bridge.dll',
            'ctptrader_bridge.dll',
            'thostmduserapi_se.dll',
            'thosttraderapi_se.dll'
          )

          foreach ($file in $files) {
            $source = Get-ChildItem NativeBridge/build -Recurse -File -Filter $file | Select-Object -First 1
            if (-not $source) {
              throw "Missing expected native asset: $file"
            }
            Copy-Item $source.FullName artifacts/win-x64/
          }

      - name: Upload Windows native assets
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: artifacts/win-x64/
          if-no-files-found: error

  pack:
    name: Pack NuGet package
    runs-on: ubuntu-latest
    needs: [build-linux-native, build-windows-native]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Linux native assets
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: artifacts/linux-x64

      - name: Download Windows native assets
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: artifacts/win-x64

      - name: Prepare runtime asset directories
        run: |
          rm -rf Ctp.Net/runtimes/linux-x64/native Ctp.Net/runtimes/win-x64/native
          mkdir -p Ctp.Net/runtimes/linux-x64/native
          mkdir -p Ctp.Net/runtimes/win-x64/native
          cp artifacts/linux-x64/* Ctp.Net/runtimes/linux-x64/native/
          cp artifacts/win-x64/* Ctp.Net/runtimes/win-x64/native/

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION=$(python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse('Ctp.Net/Ctp.Net.fsproj').getroot()
          version = None
          for group in root.findall('PropertyGroup'):
              node = group.find('Version')
              if node is not None and node.text and node.text.strip():
                  version = node.text.strip()
                  break
          if version is None:
              raise SystemExit('Version element not found in Ctp.Net.fsproj')
          print(version)
          PY
          )
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PACKAGE_VERSION" = "$TAG_VERSION" || {
            echo "Tag version '$TAG_VERSION' does not match package version '$PACKAGE_VERSION'."
            exit 1
          }

      - name: Pack NuGet package
        run: dotnet pack Ctp.Net/Ctp.Net.fsproj -p:BuildNativeBridge=false -p:PrepareNuGetRuntimeAssets=false -m:1

      - name: Verify package contents
        run: |
          unzip -l Ctp.Net/bin/Release/Ctp.Net.*.nupkg | grep 'build/Ctp.Net.targets'
          unzip -l Ctp.Net/bin/Release/Ctp.Net.*.nupkg | grep 'runtimes/linux-x64/native/libctptrader_bridge.so'
          unzip -l Ctp.Net/bin/Release/Ctp.Net.*.nupkg | grep 'runtimes/win-x64/native/ctptrader_bridge.dll'

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctp-net-nuget-package
          path: |
            Ctp.Net/bin/Release/*.nupkg
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: [pack]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)

    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download NuGet package artifact
        uses: actions/download-artifact@v4
        with:
          name: ctp-net-nuget-package
          path: artifacts/nuget

      - name: Publish package
        run: dotnet nuget push artifacts/nuget/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
